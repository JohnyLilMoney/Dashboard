<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>Server Dashboard</h1>
        </div>
        <div class="server-card" id="mail-server">
            <div class="card-top">
                <h2>Mail Server</h2>
                <span class="status-badge offline" id="mail-status-badge">
                    <span class="status-dot"></span> Offline
                </span>
            </div>
            <button class="expand-toggle" onclick="togglePanel('mail')" id="mail-toggle">
                <span class="toggle-label">Details</span>
                <span class="toggle-arrow" id="mail-arrow">▸</span>
            </button>
            <div class="expanded-panel" id="mail-panel">
                <div class="panel-section">
                    <span class="section-label">Uptime</span>
                    <span class="uptime-value" id="mail-uptime">--</span>
                </div>
            </div>
        </div>
        <div class="server-card" id="ai-server">
            <div class="card-top">
                <h2>AI Server</h2>
                <span class="status-badge offline" id="ai-status-badge">
                    <span class="status-dot"></span> Offline
                </span>
            </div>
            <button class="expand-toggle" onclick="togglePanel('ai')" id="ai-toggle">
                <span class="toggle-label">Details</span>
                <span class="toggle-arrow" id="ai-arrow">▸</span>
            </button>
            <div class="expanded-panel" id="ai-panel">
                <div class="panel-section">
                    <span class="section-label">Uptime</span>
                    <span class="uptime-value" id="ai-uptime">--</span>
                </div>
                <div class="panel-section">
                    <span class="section-label">Actions</span>
                    <div class="action-buttons">
                        <button class="action-btn start" onclick="sendCommand('ai')">Start</button>
                        <button class="action-btn restart" onclick="sendCommand('aireboot')">Restart</button>
                        <button class="action-btn stop" onclick="sendCommand('aishutdown')">Power Off</button>
                        <button class="action-btn forward" onclick="confirmWebsiteNav('//ai.johnylilmoney.nl')">Website</button>
                    </div>
                </div>
                <div class="panel-section">
                    <span class="section-label">Info</span>
                    <table class="details-table" id="ai-details">
                        <tr>
                            <td class="hidden-label">Loaded Model</td>
                            <td class="full-width-cell">
                                <div class="models-section">
                                    <div class="models-header">
                                        <span class="models-label">Loaded Model:</span>
                                        <span class="model-name" id="ai-loaded-model">--</span>
                                    </div>
                                    <div class="model-list-block" id="ai-model-list"></div>
                                </div>
                            </td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>
        <div class="server-card" id="mc-server">
            <div class="card-top">
                <h2>Minecraft Server</h2>
                <span class="status-badge offline" id="mc-status-badge">
                    <span class="status-dot"></span> Offline
                </span>
            </div>
            <button class="expand-toggle" onclick="togglePanel('mc')" id="mc-toggle">
                <span class="toggle-label">Details</span>
                <span class="toggle-arrow" id="mc-arrow">▸</span>
            </button>
            <div class="expanded-panel" id="mc-panel">
                <div class="panel-section">
                    <span class="section-label">Uptime</span>
                    <span class="uptime-value" id="mc-uptime">--</span>
                </div>
                <div class="panel-section">
                    <span class="section-label">Actions</span>
                    <div class="action-buttons">
                        <button class="action-btn start" onclick="sendCommand('mc')">Start</button>
                        <button class="action-btn restart" onclick="sendCommand('mcreboot')">Restart</button>
                        <button class="action-btn stop" onclick="sendCommand('mcshutdown')">Power Off</button>
                        <button class="action-btn forward" onclick="sendCommand('mcips')">Ip's</button>
		</div>
                </div>
                <div class="panel-section">
                    <span class="section-label">Info</span>
                    <table class="details-table" id="mc-details">
                        <tr>
                            <td class="hidden-label">Players Online</td>
                            <td class="full-width-cell">
                                <div class="players-section">
                                    <div class="players-header">
                                        <span class="players-label">Players Online:</span>
                                        <span class="player-count" id="mc-player-count">--</span>
                                    </div>
                                    <div class="player-list-block" id="mc-player-list"></div>
                                </div>
                            </td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>
    </div>
    {% if animation_pack and animation_pack != 'None' %}
        <div class="info-badge" id="infoBadge" onclick="showBackgroundInfo()">
            <svg xmlns="http://w3.org" width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; display: inline-block;">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="16" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
        </div>
    {% endif %}

    <div class="auth-modal-overlay" id="auth-modal">
        <div class="auth-modal">
            <h3>Enter password</h3>
            <form id="auth-modal-form">
                <input type="password" id="auth-password-input" placeholder="Password" autocomplete="current-password" required>
                <div class="auth-modal-error" id="auth-modal-error"></div>
                <div class="auth-modal-actions">
                    <button type="button" id="auth-modal-cancel">Cancel</button>
                    <button type="submit">Unlock</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast-container">
        <div class="toast" id="toast">
            <span id="toast-message"></span>
        </div>

        <button id="toast-reload-btn"
                class="reload-badge"
                style="display:none;"
                onclick="reloadDifferentBg()">
            <svg xmlns="http://www.w3.org/2000/svg"
                width="32"
                height="32"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="3.0"
                stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
        </button>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

    <script>
        (function() {
            const packName = "{{ animation_pack }}";
            const badge = document.getElementById('infoBadge');
            if (badge && packName && packName !== 'None') {
                badge.style.display = 'flex'; 
                badge.dataset.background = packName;
            }
            if (!packName || packName === 'None') return;

            async function loadBackgroundPack(packName) {
                const baseUrl = `/static/backgrounds/${packName}/`;
                const host = document.createElement('div');
                host.id = 'background-host';
                host.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    pointer-events: none;
                    z-index: 0;
                `;
                document.body.prepend(host);

                const shadow = host.attachShadow({ mode: 'open' });

                try {
                    const htmlResp = await fetch(baseUrl + 'index.html');
                    const html = await htmlResp.text();

                    const cssResp = await fetch(baseUrl + 'style.css');
                    const css = await cssResp.text();

                    const jsResp = await fetch(baseUrl + 'script.js');
                    const js = await jsResp.text();

                    const wrapper = document.createElement('div');
                    wrapper.innerHTML = html;
                    shadow.appendChild(wrapper);

                    const style = document.createElement('style');
                    style.textContent = css;
                    shadow.prepend(style);

                    const scriptFunc = new Function('shadowRoot', js + '\nreturn window.initAnimation(shadowRoot);');
                    const controller = scriptFunc(shadow);

                    window.__backgroundController = controller;

                } catch (err) {
                    console.warn('Failed to load background pack:', err);
                    host.remove();
                }
            }

            loadBackgroundPack(packName);
        })();
    </script>
</body>
</html>
